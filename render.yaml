# render.yaml
services:
  - type: web
    name: ecosystem-backend
    runtime: image
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO
    plan: free
    dockerfilePath: ./Dockerfile.prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecosystem-db
          property: connectionString
      - key: PORT
        value: 3030
      - key: RENDER
        value: true

  - type: postgres
    name: ecosystem-db
    plan: free
    databaseName: ecosystem
    user: postgres
