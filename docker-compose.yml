services:
  postgres:
    image: postgres:15-alpine
    container_name: ecosystem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ecosystem
    volumes:
      - ecosystem-data:/home/securityman/wslcodingprojects/jonathan/environment
    ports:
      - "5433:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecosystem-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: ecosystem
      PORT: 3030
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    ports:
      - "3030:3030"
volumes:
  ecosystem-data: